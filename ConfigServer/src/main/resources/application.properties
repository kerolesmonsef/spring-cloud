spring.application.name=ConfigServer
server.port=8888
# Native file system (for local testing without git)
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=file:${user.dir}/ConfigServer/config-data


# Or use git backend (uncomment and configure)
# spring.cloud.config.server.git.uri=https://github.com/your-org/config-repo
# spring.cloud.config.server.git.default-label=main
# spring.cloud.config.server.git.search-paths=ConfigServer/config-data/*

# Management endpoints
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always